version: '3.8'

services:
  redis-broker:
    image: redis:alpine
    ports:
      - "6379:6379"

  chat-node-1:
    build: .
    ports:
      - "3001:3000"
    environment:
      - REDIS_URL=redis://redis-broker:6379
    depends_on:
      - redis-broker

  chat-node-2:
    build: .
    ports:
      - "3002:3000"
    environment:
      - REDIS_URL=redis://redis-broker:6379
    depends_on:
      - redis-broker