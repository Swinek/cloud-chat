<!DOCTYPE html>
<html>
<head>
    <title>DevOps Cloud Chat</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
        #messages { list-style-type: none; margin: 0; padding: 0; margin-bottom: 40px; }
        #messages li { padding: 10px; background: white; margin-bottom: 5px; border-radius: 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        form { background: #fff; padding: 10px; position: fixed; bottom: 0; left: 0; right: 0; display: flex; box-shadow: 0 -2px 5px rgba(0,0,0,0.1); }
        input { border: 1px solid #ccc; padding: 10px; flex-grow: 1; border-radius: 5px; margin-right: 10px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #messages li.manual { background: #ffcccc; border: 1px solid red; }
        #messages li.flood { background: white; }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form" action="">
        <input id="input" autocomplete="off" placeholder="Type a message..." /><button>Send</button>
    </form>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io({
            transports: ['websocket']
        });

        var form = document.getElementById('form');
        var input = document.getElementById('input');
        var messages = document.getElementById('messages');

form.addEventListener('submit', function(e) {
    e.preventDefault();
    if (input.value) {
        socket.emit('chat message', { text: input.value, isManual: true });
        input.value = '';
    }
});

socket.on('chat message', function(data) {
    var item = document.createElement('li');
    item.textContent = data.text;
    
    if (data.isManual) {
        item.classList.add('manual');
    } else {
        item.classList.add('flood');
    }
    
    messages.appendChild(item);
    window.scrollTo(0, document.body.scrollHeight);
});

    </script>
</body>
</html>
